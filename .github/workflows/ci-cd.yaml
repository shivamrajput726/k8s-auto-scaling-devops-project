name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: fastapi-k8s-app

jobs:
  build-test-push:
    name: Test and Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run tests
        run: pytest app/tests -q

      - name: Run filesystem security scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Set image metadata
        id: image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "repository=${{ env.APP_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "repository=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "image_uri=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.repository }}:latest

      - name: Run image security scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.image.outputs.image_uri }}
          severity: HIGH,CRITICAL
          exit-code: 1

  deploy:
    name: Deploy to Kubernetes
    if: github.event_name != 'pull_request'
    needs: build-test-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Render deployment manifest
        env:
          IMAGE_URI: ${{ needs.build-test-push.outputs.image_uri }}
        run: |
          sed "s|IMAGE_PLACEHOLDER|${IMAGE_URI}|g" k8s/deployment.yaml > k8s/deployment.rendered.yaml

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client -f k8s/cluster-issuer.yaml
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/serviceaccount.yaml
          kubectl apply --dry-run=client -f k8s/secret.yaml
          kubectl apply --dry-run=client -f k8s/configmap.yaml
          kubectl apply --dry-run=client -f k8s/service.yaml
          kubectl apply --dry-run=client -f k8s/deployment.rendered.yaml
          kubectl apply --dry-run=client -f k8s/hpa.yaml
          kubectl apply --dry-run=client -f k8s/pdb.yaml
          kubectl apply --dry-run=client -f k8s/networkpolicy.yaml
          kubectl apply --dry-run=client -f k8s/ingress.yaml

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/cluster-issuer.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.rendered.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/networkpolicy.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify rollout
        run: kubectl rollout status deployment/fastapi-app -n scalable-app --timeout=180s

      - name: Roll back deployment on failed rollout
        if: failure()
        run: |
          kubectl rollout undo deployment/fastapi-app -n scalable-app
          kubectl rollout status deployment/fastapi-app -n scalable-app --timeout=180s

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          kubectl get all -n scalable-app
          kubectl describe deployment fastapi-app -n scalable-app
          kubectl get events -n scalable-app --sort-by=.lastTimestamp
